      string: '{"translations":[{"text":"<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE
        document SYSTEM \"CommonMark.dtd\">\n<document xmlns=\"http://commonmark.org/xml/1.0\">\n  <paragraph>\n    <text
        xml:space=\"preserve\">Cet article a été rédigé en Markdown standard (</text>\n    <code
        xml:space=\"preserve\">*.md</code>\n    <text xml:space=\"preserve\">) plutôt
        qu’en R Markdown (</text>\n    <code xml:space=\"preserve\">*.Rmd</code>\n    <text
        xml:space=\"preserve\">). Les principales différences sont les suivantes :</text>\n  </paragraph>\n  \n  <paragraph>\n    <code
        xml:space=\"preserve\">a6ce0e7e73fc91558963656fc99d47e8</code>\n  </paragraph>\n  \n  <list
        type=\"ordered\" start=\"1\" delim=\"period\" tight=\"true\">\n    <item>\n      <paragraph>\n        <text
        xml:space=\"preserve\">Tu ne peux pas exécuter de code R dans un document
        Markdown standard, alors que dans un document R Markdown, tu peux intégrer
        des blocs de code R (</text>\n        <code xml:space=\"preserve\">```{r}</code>\n        <text
        xml:space=\"preserve\">) ;</text>\n      </paragraph>\n    </item>\n    <item>\n      <paragraph>\n        <text
        xml:space=\"preserve\">un article en Markdown standard est généré via</text>\n        <link
        destination=\"https://gohugo.io/overview/configuration/\" title=\"\">\n          <text
        xml:space=\"preserve\">Blackfriday</text>\n        </link>\n        <text
        xml:space=\"preserve\">, tandis qu’un document R Markdown est compilé par</text>\n        <link
        destination=\"http://rmarkdown.rstudio.com\" title=\"\">\n          <strong>\n            <text
        xml:space=\"preserve\">rmarkdown</text>\n          </strong>\n        </link>\n        <text
        xml:space=\"preserve\">et</text>\n        <link destination=\"http://pandoc.org\"
        title=\"\">\n          <text xml:space=\"preserve\">Pandoc</text>\n        </link>\n        <text
        xml:space=\"preserve\">.</text>\n      </paragraph>\n    </item>\n  </list>\n  \n  <paragraph>\n    <text
        xml:space=\"preserve\">Il existe de nombreuses différences de syntaxe entre
        le Markdown de Blackfriday et celui de Pandoc. Par exemple, tu peux rédiger
        une liste de tâches avec Blackfriday, mais pas avec Pandoc :</text>\n  </paragraph>\n  \n  <list
        type=\"bullet\" tight=\"true\">\n    <tasklist completed=\"true\">\n      <paragraph>\n        <text
        xml:space=\"preserve\">Écrire un package R.</text>\n      </paragraph>\n    </tasklist>\n    <tasklist
        completed=\"false\">\n      <paragraph>\n        <text xml:space=\"preserve\">Écrire
        un livre.</text>\n      </paragraph>\n    </tasklist>\n    <tasklist completed=\"false\">\n      <paragraph>\n        <text
        xml:space=\"preserve\">...</text>\n      </paragraph>\n    </tasklist>\n    <tasklist
        completed=\"false\">\n      <paragraph>\n        <text xml:space=\"preserve\">Profite
        bien !</text>\n      </paragraph>\n    </tasklist>\n  </list>\n  \n  <paragraph>\n    <text
        xml:space=\"preserve\">Lorsque tu crées un nouvel article, tu dois choisir
        si le format de l''article est Markdown ou R Markdown, ce qui peut être fait
        via l''</text>\n    <text xml:space=\"preserve\">argument</text>\n    <text
        xml:space=\"preserve\"></text>\n    <code xml:space=\"preserve\">ext</code>\n    \n    <text
        xml:space=\"preserve\">de la fonction</text>\n    <code xml:space=\"preserve\">blogdown::new_post()</code>\n    <text
        xml:space=\"preserve\">, par exemple</text>\n    <text xml:space=\"preserve\"></text>\n  </paragraph>\n  <code_block
        info=\"r\" xml:space=\"preserve\" name=\"\">blogdown::new_post(\"Post Title\",
        ext = ''.Rmd'')\n</code_block>\n</document>\n","detected_source_language":"EN","tag_handling_version":"v2"}]}'
